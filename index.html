<!DOCTYPE html>
<html>
<head>
  <title>Área Restrita</title>

  <!-- Firebase versão compatível -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>

<body>

<h2>Login - Compras</h2>

<input type="email" id="email" placeholder="E-mail"><br><br>
<input type="password" id="senha" placeholder="Senha"><br><br>

<button onclick="login()">Entrar</button>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCaZEJKElx-WNxpvFou9kppvlummU4bZxs",
    authDomain: "central-compras.firebaseapp.com",
    projectId: "central-compras"
  };

  firebase.initializeApp(firebaseConfig);

  function login() {
    var email = document.getElementById("email").value;
    var senha = document.getElementById("senha").value;

    firebase.auth().signInWithEmailAndPassword(email, senha)
      .then(() => {
        alert("Login realizado com sucesso!");
        window.location.href = "https://google.com";
      })
      .catch((erro) => {
        alert(erro.message);
      });
  }
</script>

</body>
</html>
